<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/Felix-universal-chatbot-web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Internal knowledge assistant.">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111318">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Knowledge Assistant">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Knowledge Assistant</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Dark background while Flutter boots — avoids a white flash. */
    html, body { background: #111318; margin: 0; padding: 0; height: 100%; }
    #splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: #111318; z-index: 9999;
      transition: opacity 300ms ease-out;
    }
    #splash img {
      width: 72px; height: 72px; border-radius: 18px;
      animation: splash-pulse 1.6s ease-in-out infinite;
    }
    #splash .bar {
      width: 96px; height: 3px; border-radius: 3px; overflow: hidden;
      background: rgba(255, 255, 255, 0.08); position: relative;
    }
    #splash .bar::after {
      content: ""; position: absolute; top: 0; left: -40%;
      width: 40%; height: 100%; border-radius: 3px;
      background: #5B8DEF;
      animation: splash-slide 1.2s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.94); opacity: 0.85; }
    }
    @keyframes splash-slide {
      0% { left: -40%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-192.png" alt="">
    <div class="bar"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (!s) return;
      s.style.opacity = '0';
      setTimeout(function () { s.remove(); }, 320);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
